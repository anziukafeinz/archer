name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  bats:
    name: bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: sudo apt-get update -y && sudo apt-get install -y bats jq openssl curl
      - name: run bats
        run: bats --tap tests/

  shellcheck:
    name: shellcheck (active surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck
      - name: lint
        # M8 fixed the SC2261 in calc.sh, so the full active surface is
        # now part of the lint gate. Severity=error catches real bugs.
        run: make lint
